        
        <!-- Main Content -->
           <div class="main-content" style="min-height: 491px;">

        <div class="section-header flex-wrap">
            <h1 class="mr-3">Priority</h1>
            
        </div>
        <div class="section-body">
                        <div class="card">
                <div class="card-body">
                    <div wire:id="PBZDtd1YnJXL56oM0tGb">
    
    
                <div class="users-card">
                    <!-- ADD CATEGORY -->
    <div class="row mb-3">
        <div class="col-md-6">
            <div class="input-group">
                <input type="text" id="priorityName" class="form-control" placeholder="Add priority"> &nbsp;
                 <input type="number" id="days" class="form-control" placeholder="Days e.g. 7"> &nbsp;
                <div class="input-group-append">
                    <button class="btn btn-primary" id="addPriorityBtn">Add</button>

<div class="modal fade" id="editModal" tabindex="-1">
<div class="modal-dialog">
<div class="modal-content">

<div class="modal-header">
    <h5 class="modal-title">Edit Priority</h5>
    <button type="button" class="close" data-dismiss="modal">&times;</button>
</div>

<div class="modal-body">
    <input type="hidden" id="editId">
    <div class="form-group">
        <label>Priority Name</label>
        <input type="text" id="editName" class="form-control">
       
    </div>
     <div class="form-group">
        <label>Due Days</label>
        <input type="number" id="editDays" class="form-control">
       
    </div>
</div>

<div class="modal-footer">
    <button type="button" id="updateBtn" class="btn btn-success">Update</button>
    <button type="button" class="btn btn-secondary" data-dismiss="modal">Close</button>
</div>

</div>
</div>
</div>
<script>



document.addEventListener("DOMContentLoaded", function () {

    const tableBody = document.getElementById("priorityTable");
    const alertBox = document.getElementById("alertBox");
    const addBtn = document.getElementById("addPriorityBtn");
    const priorityInput = document.getElementById("priorityName");
    const days = document.getElementById("days");
    const updateBtn = document.getElementById("updateBtn");

    /* ==============================
       SHOW ALERT
    ============================== */
    function showAlert(message, type = "success") {
        alertBox.innerHTML = `
            <div class="alert alert-${type} alert-dismissible fade show">
                ${message}
                <button type="button" class="close" data-dismiss="alert">&times;</button>
            </div>`;
        setTimeout(() => alertBox.innerHTML = "", 3000);
    }

    /* ==============================
       LOAD CATEGORIES
    ============================== */
    function loadCategories() {
        tableBody.innerHTML = `
            <tr>
                <td colspan="3" class="text-center">Loading...</td>
            </tr>`;

        fetch("apps/model/fetch_priority.php")
            .then(res => res.text())
            .then(data => {
                tableBody.innerHTML = data.trim() !== "" 
                    ? data 
                    : `<tr><td colspan="3" class="text-center text-muted">No priorities found</td></tr>`;
            })
            .catch(() => {
                tableBody.innerHTML = `<tr><td colspan="3" class="text-danger text-center">Failed to load data</td></tr>`;
            });
    }

    loadCategories();

    /* ==============================
       ADD CATEGORY
    ============================== */
    addBtn.addEventListener("click", function () {

    const name = priorityInput.value.trim();
    const duedate = days.value.trim();

    if (!name) {
        showAlert("Priority name required", "danger");
        return;
    }

    if (!duedate) {
        showAlert("Due days required", "danger");
        return;
    }

    fetch("apps/model/add_priority.php", {
        method: "POST",
        headers: {
            "Content-Type": "application/x-www-form-urlencoded"
        },
        body: new URLSearchParams({
            priority_name: name,
            due_date: duedate
        })
    })
    .then(res => res.json())
    .then(data => {

        if (data.status === "success") {
            priorityInput.value = "";
            days.value = "";
            showAlert(data.message, "success");
            loadCategories();
        } else {
            showAlert(data.message, "danger");
        }

    })
    .catch(err => {
        console.error(err);
        showAlert("Server error occurred", "danger");
    });
});


    /* ==============================
   EDIT & DELETE (EVENT DELEGATION)
============================== */
document.addEventListener("click", function (e) {

    /* EDIT */
    if (e.target.classList.contains("edit-btn")) {

        document.getElementById("editId").value   = e.target.dataset.id;
        document.getElementById("editName").value = e.target.dataset.name;
        document.getElementById("editDays").value = e.target.dataset.duedate;

        $('#editModal').modal('show');
    }

    /* DELETE */
    if (e.target.classList.contains("delete-btn")) {

        if (!confirm("Are you sure you want to delete this priority?")) return;

        const id = e.target.dataset.id;

        fetch("apps/model/del_priority.php?id=" + id)
            .then(res => res.json())
            .then(data => {

                if (data.status === "success") {
                    showAlert("Priority deleted successfully", "success");
                    loadCategories();
                } else {
                    showAlert(data.message, "danger");
                }

            })
            .catch(err => {
                console.error(err);
                showAlert("Server error occurred", "danger");
            });
    }

});


/* ==============================
   UPDATE PRIORITY
============================== */
updateBtn.addEventListener("click", function () {

    const id      = document.getElementById("editId").value;
    const name    = document.getElementById("editName").value.trim();
    const duedate = document.getElementById("editDays").value.trim();

    if (!name) {
        showAlert("Priority name required", "danger");
        return;
    }

    if (!duedate) {
        showAlert("Due days required", "danger");
        return;
    }

    fetch("apps/model/update_priority.php", {
        method: "POST",
        headers: {
            "Content-Type": "application/x-www-form-urlencoded"
        },
        body: new URLSearchParams({
            id: id,
            priority_name: name,
            due_date: duedate
        })
    })
    .then(res => res.json())
    .then(data => {

        if (data.status === "success") {
            $('#editModal').modal('hide');
            showAlert(data.message, "success");
            loadCategories();
        } else {
            showAlert(data.message, "danger");
        }

    })
    .catch(err => {
        console.error(err);
        showAlert("Server error occurred", "danger");
    });

});


});
</script>
