    <div class="row mb-3">

<div class="modal fade" id="editModal" tabindex="-1">
<div class="modal-dialog">
<div class="modal-content">

<div class="modal-header">
    <h5 class="modal-title">Edit Category</h5>
    <button type="button" class="close" data-dismiss="modal">&times;</button>
</div>

<div class="modal-body">
    <input type="hidden" id="editId">
    <div class="form-group">
        <label>Category Name</label>
        <input type="text" id="editName" class="form-control">
    </div>
</div>

<div class="modal-footer">
    <button type="button" id="updateBtn" class="btn btn-success">Update</button>
    <button type="button" class="btn btn-secondary" data-dismiss="modal">Close</button>
</div>

</div>
</div>
</div>
<script>
document.addEventListener("DOMContentLoaded", function () {

    const tableBody = document.getElementById("categoryTable");
    const alertBox = document.getElementById("alertBox");
    const addBtn = document.getElementById("addCategoryBtn");
    const categoryInput = document.getElementById("categoryName");
    const updateBtn = document.getElementById("updateBtn");

    /* ==============================
       SHOW ALERT
    ============================== */
    function showAlert(message, type = "success") {
        alertBox.innerHTML = `
            <div class="alert alert-${type} alert-dismissible fade show">
                ${message}
                <button type="button" class="close" data-dismiss="alert">&times;</button>
            </div>`;
        setTimeout(() => alertBox.innerHTML = "", 3000);
    }

    /* ==============================
       LOAD CATEGORIES
    ============================== */
    function loadCategories() {
        tableBody.innerHTML = `
            <tr>
                <td colspan="3" class="text-center">Loading...</td>
            </tr>`;

        fetch("apps/model/fetch_categories.php")
            .then(res => res.text())
            .then(data => {
                tableBody.innerHTML = data.trim() !== "" 
                    ? data 
                    : `<tr><td colspan="3" class="text-center text-muted">No categories found</td></tr>`;
            })
            .catch(() => {
                tableBody.innerHTML = `<tr><td colspan="3" class="text-danger text-center">Failed to load data</td></tr>`;
            });
    }

    loadCategories();

    /* ==============================
       ADD CATEGORY
    ============================== */
    addBtn.addEventListener("click", function () {

        const name = categoryInput.value.trim();

        if (name === "") {
            showAlert("Category name required", "danger");
            return;
        }

        fetch("apps/model/add_category.php", {
            method: "POST",
            headers: { "Content-Type": "application/x-www-form-urlencoded" },
            body: "category_name=" + encodeURIComponent(name)
        })
        .then(res => res.json())
        .then(data => {

            if (data.status === "success") {
                categoryInput.value = "";
                showAlert("Category added successfully");
                loadCategories();
            } else {
                showAlert(data.message, "danger");
            }

        });
    });

    /* ==============================
       EDIT & DELETE (EVENT DELEGATION)
    ============================== */
    document.addEventListener("click", function (e) {

        /* EDIT */
        if (e.target.classList.contains("edit-btn")) {

            document.getElementById("editId").value = e.target.dataset.id;
            document.getElementById("editName").value = e.target.dataset.name;

            $('#editModal').modal('show');
        }

        /* DELETE */
        if (e.target.classList.contains("delete-btn")) {

            if (!confirm("Are you sure you want to delete this category?")) return;

            const id = e.target.dataset.id;

            fetch("apps/model/delete_category.php?id=" + id)
                .then(res => res.json())
                .then(data => {

                    if (data.status === "success") {
                        showAlert("Category deleted successfully");
                        loadCategories();
                    } else {
                        showAlert(data.message, "danger");
                    }

                });
        }

    });

    /* ==============================
       UPDATE CATEGORY
    ============================== */
    updateBtn.addEventListener("click", function () {

        const id = document.getElementById("editId").value;
        const name = document.getElementById("editName").value.trim();

        if (name === "") {
            showAlert("Category name required", "danger");
            return;
        }

        fetch("apps/model/update_category.php", {
            method: "POST",
            headers: { "Content-Type": "application/x-www-form-urlencoded" },
            body: "id=" + id + "&category_name=" + encodeURIComponent(name)
        })
        .then(res => res.json())
        .then(data => {

            if (data.status === "success") {
                $('#editModal').modal('hide');
                showAlert("Category updated successfully");
                loadCategories();
            } else {
                showAlert(data.message, "danger");
            }

        });

    });

});
</script>
