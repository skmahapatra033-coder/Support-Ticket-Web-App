<!-- AJAX Fetch Email -->
<script>
$(document).ready(function(){

$('#customer_id').on('change', function(){

    let customerId = $(this).val();

    if(customerId !== ''){

        $.ajax({
            url: 'apps/model/fetch_customer_email.php',
            type: 'POST',
            data: { customer_id: customerId },
            dataType: 'json',
            success: function(response){

                if(response.status === 'success'){
                    $('#email').val(response.email);
                } else {
                    $('#email').val('');
                }
            }
        });

    } else {
        $('#email').val('');
    }

});

});
</script>
<script>

document.getElementById("client_id").addEventListener("change", function () {

    const clientId = this.value;
    const customerSelect = document.getElementById("customer_id");

    customerSelect.innerHTML = '<option value="">Loading...</option>';

    if (!clientId) {
        customerSelect.innerHTML = '<option value="">-- Select Customer --</option>';
        return;
    }

    fetch(`apps/model/get_customers_by_client.php?client_id=${clientId}`)
        .then(res => res.json())
        .then(data => {

            if (data.status !== "success") {
                customerSelect.innerHTML =
                    '<option value="">No customers found</option>';
                return;
            }

            let options = '<option value="">-- Select Customer --</option>';

            data.customers.forEach(cust => {
                options += `<option value="${cust.id}">
                                ${cust.name}
                            </option>`;
            });

            customerSelect.innerHTML = options;
        })
        .catch(err => {
            console.error(err);
            customerSelect.innerHTML =
                '<option value="">Error loading customers</option>';
        });
});
</script>
