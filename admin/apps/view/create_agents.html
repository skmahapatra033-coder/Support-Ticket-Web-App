		/* IMAGE PREVIEW */
		function previewImage(input) {
			const preview = document.getElementById('imagePreview');
			if (input.files && input.files[0]) {
				const reader = new FileReader();
				reader.onload = function(e) {
					preview.src = e.target.result;
					preview.style.display = 'block';
				}
				reader.readAsDataURL(input.files[0]);
			}
		}

	<script>
let aboutEditor; // store editor instance

/* ===============================
   INITIALIZE CKEDITOR
================================ */
ClassicEditor
    .create(document.querySelector('#about'))
    .then(editor => {
        aboutEditor = editor;
    })
    .catch(error => {
        console.error("Editor Error:", error);
    });


/* ===============================
   FORM SUBMIT
================================ */
document.getElementById('agentForm').addEventListener('submit', function (e) {
    e.preventDefault();

    if (typeof checkPasswordMatch === "function") {
        if (!checkPasswordMatch()) return;
    }

    const form = this;
    const submitBtn = document.getElementById('submitBtn');

    // IMPORTANT: Sync CKEditor data to textarea
    if (aboutEditor) {
        document.querySelector('#about').value = aboutEditor.getData();
    }

    const formData = new FormData(form);

    submitBtn.innerHTML = `
        <span class="spinner-border spinner-border-sm"></span>
        Saving...
    `;
    submitBtn.disabled = true;

    fetch('apps/model/add_agent_ajax.php', {
        method: 'POST',
        body: formData
    })
    .then(response => {

        if (!response.ok) {
            throw new Error("HTTP error " + response.status);
        }

        return response.json();
    })
    .then(data => {

        submitBtn.innerHTML = 'Save Agent';
        submitBtn.disabled = false;

        if (data.status === 'success') {

            alert('Agent added successfully!');
            window.location.href = 'agents.php';

        } else {

            alert(data.message || 'Server returned an error.');
        }

    })
    .catch(error => {

        submitBtn.innerHTML = 'Save Agent';
        submitBtn.disabled = false;

        console.error("Fetch Error:", error);
        alert('Something went wrong. Check console.');
    });
});
</script>
