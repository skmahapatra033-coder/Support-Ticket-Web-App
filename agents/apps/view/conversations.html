 <script>
function toggleEmoji() {
    document.getElementById('emojiPicker').style.display =
        document.getElementById('emojiPicker').style.display === 'block' ? 'none' : 'block';
}

document.querySelectorAll('.emoji-picker span').forEach(e => {
    e.onclick = () => {
        document.getElementById('messageInput').value += e.innerText;
    };
});

function sendMessage() {
    let msg = document.getElementById('messageInput').value;
    if (!msg) return;

    document.getElementById('chatMessages').innerHTML += `
        <div class="message sent">
            <div class="bubble">${msg}</div>
            <span class="msg-time">Now</span>
        </div>
    `;
    document.getElementById('messageInput').value = '';
}

function toggleChat() {
    document.querySelector('.chat-sidebar').classList.toggle('open');
}

function toggleDark() {
    document.body.classList.toggle('dark-mode');
}
</script>
<script>
document.addEventListener('DOMContentLoaded', function () {
    const tabActive = document.getElementById('tabActive');
    const tabArchive = document.getElementById('tabArchive');
    const chats = document.querySelectorAll('.chat-user');

    function showChats(type) {
        chats.forEach(chat => {
            chat.style.display =
                chat.dataset.chatType === type ? 'flex' : 'none';
        });
    }

    tabActive.addEventListener('click', function () {
        tabActive.classList.add('active');
        tabArchive.classList.remove('active');
        showChats('active');
    });

    tabArchive.addEventListener('click', function () {
        tabArchive.classList.add('active');
        tabActive.classList.remove('active');
        showChats('archive');
    });

    // Default view
    showChats('active');
});
</script>
<script>
document.addEventListener('DOMContentLoaded', function () {

    const chatUsers = document.querySelectorAll('.chat-user');
    const chatHeader = document.getElementById('chatHeader');
    const chatUserName = document.getElementById('chatUserName');
    const chatMessages = document.getElementById('chatMessages');
    const chatInput = document.getElementById('chatInput');

    chatUsers.forEach(user => {
        user.addEventListener('click', function () {

            // Highlight selected user
            chatUsers.forEach(u => u.classList.remove('active'));
            this.classList.add('active');

            // Show right panel
            chatHeader.classList.remove('d-none');
            chatMessages.classList.remove('d-none');
            chatInput.classList.remove('d-none');

            // Set header name
            chatUserName.innerText = this.dataset.chatName;

            // Load messages (STATIC DEMO — replace with AJAX/Livewire)
            chatMessages.innerHTML = `
                <div class="message received">
                    <div class="bubble">Hello Agent 👋</div>
                    <span class="msg-time">03:32 pm</span>
                </div>
                <div class="message sent">
                    <div class="bubble">Hi! How can I help you? 😊</div>
                    <span class="msg-time">03:33 pm</span>
                </div>
            `;

            // Auto scroll
            chatMessages.scrollTop = chatMessages.scrollHeight;
        });
    });

});
