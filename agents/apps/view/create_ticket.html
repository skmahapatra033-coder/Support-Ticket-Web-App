<script>
$(document).ready(function(){

    $('#customer_id').on('change', function(){

        let customerId = $(this).val();

        if(customerId !== ''){

            $.ajax({
                url: 'apps/model/fetch_customer_email.php',
                type: 'POST',
                data: { customer_id: customerId },
                dataType: 'json',
                success: function(response){

                    if(response.status === 'success'){
                        $('#email').val(response.email);
						$('#cname').val(response.name);
                    } else {
                        $('#email').val('');
                        alert(response.message);
                    }
                },
                error: function(){
                    alert('AJAX request failed');
                }
            });

        } else {
            $('#email').val('');
        }

    });

});
</script>
<script>
document.getElementById("prioritySelect").addEventListener("change", function () {

    const selectedOption = this.options[this.selectedIndex];
    const days = selectedOption.dataset.days;

    if (!days) {
        document.getElementById("dueDateInput").value = "";
        return;
    }

    const today = new Date();
    today.setDate(today.getDate() + parseInt(days));

    const year  = today.getFullYear();
    const month = String(today.getMonth() + 1).padStart(2, '0');
    const day   = String(today.getDate()).padStart(2, '0');

    document.getElementById("dueDateInput").value = `${year}-${month}-${day}`;
});
</script>
