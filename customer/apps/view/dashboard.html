function loadDashboardCounts() {

    fetch("apps/model/fetch_dashboard_counts.php")
    .then(res => res.json())
    .then(data => {

        if (data.status === "success") {

            document.getElementById("totalOpenTickets").textContent = data.totalOpenTickets;
            document.getElementById("closeTickets").textContent = data.closeTickets;
            document.getElementById("rejectedTickets").textContent = data.rejectedTickets;
            document.getElementById("underTestingTickets").textContent = data.underTestingTickets;
            document.getElementById("passTestingTickets").textContent = data.passTestingTickets;
            document.getElementById("failedTestingTickets").textContent = data.failedTestingTickets;
            document.getElementById("InapprovalTickets").textContent = data.InapprovalTickets;

        }

    })
    .catch(err => {
        console.error("Dashboard count error:", err);
    });
}

document.addEventListener("DOMContentLoaded", function(){
    loadDashboardCounts();
});
</script>
<script>
let currentPage = 1;
let limit = 10;

function loadTickets(page = 1) {

    const statusSelect = document.getElementById("filterstatus");
    const approveStatus = document.getElementById("filterinapprove")?.value || "";

    // Get multiple selected values
    let selectedStatuses = Array.from(statusSelect.selectedOptions).map(opt => opt.value);

    // If nothing selected → default Open + Under Testing
    if (selectedStatuses.length === 0) {
        selectedStatuses = ["Open", "Under Testing"];
    }

    const params = new URLSearchParams();
    params.append("page", page);
    params.append("limit", limit);
    params.append("approve_status", approveStatus);

    // Append multiple status values
    selectedStatuses.forEach(status => {
        params.append("status[]", status);
    });

    fetch(`apps/model/fetch_tickets_lists.php?${params.toString()}`)
        .then(response => {
            if (!response.ok) throw new Error("Network response not OK");
            return response.json();
        })
        .then(data => {

            if (!data || data.status !== "success") {
                document.getElementById("agentWiseTicket").innerHTML =
                    `<div class="alert alert-danger">Failed to load tickets</div>`;
                return;
            }

            let tickets = data.tickets || [];

            let html = `
            <div class="table-responsive">
                <table class="table table-bordered table-hover table-striped table-sm mb-0 align-middle">
                    <thead class="thead-dark text-center">
                        <tr>
                            <th>Ticket No</th>
                            <th>Created On</th>
                            <th>Due Date</th>
                            <th>Ticket Title</th>
                            <th>Status</th>
                            <th>Effort Approve Status</th>
                            <th>Priority</th>
                            <th>Agent</th>
                            <th>Estimated Effort</th>
                            <th>Actual Effort</th>
                        </tr>
                    </thead>
                    <tbody>
            `;

            if (tickets.length === 0) {
                html += `
                    <tr>
                        <td colspan="10" class="text-center py-4 text-muted">
                            No Tickets Found
                        </td>
                    </tr>`;
            } else {

                tickets.forEach(ticket => {

                    let statusBadge = `<span class="badge badge-warning text-black">${ticket.status}</span>`;

                    if (ticket.status === 'Closed')
                        statusBadge = `<span class="badge badge-success">${ticket.status}</span>`;

                    if (ticket.status === 'Rejected')
                        statusBadge = `<span class="badge badge-info text-white">${ticket.status}</span>`;

                    if (ticket.status === 'Under Testing')
                        statusBadge = `<span class="badge badge-primary text-white">${ticket.status}</span>`;

                    if (ticket.status === 'Testing Passed')
                        statusBadge = `<span class="badge badge-dark">${ticket.status}</span>`;

                    if (ticket.status === 'Testing Failed')
                        statusBadge = `<span class="badge badge-danger">${ticket.status}</span>`;

                    let approveBadge = '-';

                    if (ticket.estimate_effort > 0) {
                        if (ticket.approve_status === 'Approved')
                            approveBadge = `<span class="badge badge-success">${ticket.approve_status}</span>`;
                        else if (ticket.approve_status === 'Rejected')
                            approveBadge = `<span class="badge badge-danger">${ticket.approve_status}</span>`;
                        else
                            approveBadge = `<span class="badge badge-secondary">${ticket.approve_status ?? 'Pending'}</span>`;
                    }

                    html += `
                        <tr>
                            <td>${ticket.ticket_no ?? ''}</td>
                            <td>
                                ${ticket.created_at 
                                    ? new Date(ticket.created_at).toLocaleDateString('en-GB') 
                                    : ''}
                                </td>
                                <td>
                                ${ticket.due_date 
                                    ? new Date(ticket.due_date).toLocaleDateString('en-GB') 
                                    : ''}
                                </td>
                            <td>${ticket.ticket_title ?? ''}</td>
                            <td class="text-center">${statusBadge}</td>
                            <td class="text-center">${approveBadge}</td>
                            <td>${ticket.priority ?? ''}</td>
                            <td>${ticket.agent ?? ''}</td>
                            <td class="text-center">${ticket.estimate_effort || '-'}</td>
                            <td class="text-center">${ticket.actual_effort || '-'}</td>
                        </tr>
                    `;
                });
            }

            html += `
                    </tbody>
                </table>
            </div>
            `;

            document.getElementById("agentWiseTicket").innerHTML = html;
        })
        .catch(error => {
            console.error("Fetch error:", error);
            document.getElementById("agentWiseTicket").innerHTML =
                `<div class="alert alert-danger">Error loading tickets</div>`;
        });
}
document.addEventListener("DOMContentLoaded", function () {
    loadTickets();

    document.getElementById("filterstatus")?.addEventListener("change", () => loadTickets(1));
    document.getElementById("filterinapprove")?.addEventListener("change", () => loadTickets(1));
});
</script>
