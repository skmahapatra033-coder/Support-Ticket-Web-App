<script>
// IMAGE PREVIEW
function previewImage(input) {
    const preview = document.getElementById('imagePreview');
    if (input.files && input.files[0]) {
        const reader = new FileReader();
        reader.onload = e => preview.src = e.target.result;
        reader.readAsDataURL(input.files[0]);
    }
}


// CKEDITOR
let aboutEditor;
ClassicEditor.create(document.querySelector('#about'))
.then(editor => { aboutEditor = editor; });

// SUBMIT
document.getElementById('profileForm').addEventListener('submit', function(e){
    e.preventDefault();

    
    const submitBtn = document.getElementById('submitBtn');

    if (aboutEditor) {
        document.querySelector('#about').value = aboutEditor.getData();
    }

    const formData = new FormData(this);

    submitBtn.innerHTML = `<span class="spinner-border spinner-border-sm"></span> Updating...`;
    submitBtn.disabled = true;

    fetch('apps/model/update_profile.php', {
        method: 'POST',
        body: formData
    })
    .then(res => res.json())
    .then(data => {

        submitBtn.innerHTML = 'Update Profile';
        submitBtn.disabled = false;

        if(data.status === 'success'){
            alert('Profile updated successfully!');
            location.reload();
        }else{
            alert(data.message || 'Update failed');
        }
    })
    .catch(err=>{
        submitBtn.innerHTML = 'Update Profile';
        submitBtn.disabled = false;
        alert('Something went wrong.');
        console.error(err);
    });
});
</script>
