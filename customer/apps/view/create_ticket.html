<script>
document.getElementById("prioritySelect").addEventListener("change", function () {

    const selectedOption = this.options[this.selectedIndex];
    const days = selectedOption.dataset.days;

    if (!days) {
        document.getElementById("dueDateInput").value = "";
        return;
    }

    const today = new Date();
    today.setDate(today.getDate() + parseInt(days));

    const year  = today.getFullYear();
    const month = String(today.getMonth() + 1).padStart(2, '0');
    const day   = String(today.getDate()).padStart(2, '0');

    document.getElementById("dueDateInput").value = `${year}-${month}-${day}`;
});
</script>
